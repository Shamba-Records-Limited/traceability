name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dco:
    name: Check DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify every commit on the PR is signed off
        run: |
          missing=0
          while IFS= read -r sha; do
            msg=$(git log -1 --format=%B "$sha")
            if ! grep -qE "^Signed-off-by: [^<]+ <[^@]+@[^>]+>" <<<"$msg"; then
              echo "::error::Commit $sha is missing a 'Signed-off-by' trailer."
              missing=1
            fi
          done < <(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})

          if [[ $missing -ne 0 ]]; then
            echo ""
            echo "Run \`git commit --amend -s\` (or \`git rebase --signoff\`) and force-push."
            echo "See CONTRIBUTING.md for the DCO policy."
            exit 1
          fi
