version: 2
# Dependabot configuration for Shamba Traceability.
#
# Strategy: one grouped PR per ecosystem per week (covering minor + patch
# bumps), and a separate PR per major bump so they get individual review.
# This keeps the PR queue manageable while still surfacing breaking changes
# explicitly.

updates:
  # ---------------------------------------------------------------------------
  # npm (root + every workspace) — pnpm uses one root lockfile, so a root-level
  # scan is sufficient and we deliberately do NOT add per-workspace entries.
  # Workspace package.json files are still scanned for vulnerable advisories
  # via GitHub's native dependency graph.
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # Go modules — one ecosystem entry per Go service.
  # ---------------------------------------------------------------------------
  - package-ecosystem: gomod
    directory: "/services/hedera-publisher"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, go, hedera]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"
      go-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # GitHub Actions — almost always safe to bundle.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      actions-all:
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # Container base images.
  # ---------------------------------------------------------------------------
  - package-ecosystem: docker
    directory: "/services/hedera-publisher"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, docker]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      docker-all:
        patterns:
          - "*"
