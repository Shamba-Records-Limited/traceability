name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much as you can.
        For security vulnerabilities, please use the [private security advisory flow](../../security/advisories/new) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce the bug?
      description: Step-by-step. Include sample data or screenshots where helpful.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, commit SHA, or release version where the bug was observed.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which part of the system?
      multiple: false
      options:
        - apps/web
        - services/hedera-publisher
        - services/deforestation
        - services/dds-generator
        - services/did-issuer
        - packages/contracts
        - packages/shared-types
        - infra / CI
        - docs
        - I'm not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste logs, error messages, or screenshots. Redact any secrets.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
