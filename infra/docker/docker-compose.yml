services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: shamba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shamba
      POSTGRES_USER: shamba
      POSTGRES_PASSWORD: shamba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shamba -d shamba"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shamba-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ipfs:
    # Optional: only needed for evidence storage flows. Comment out to skip.
    image: ipfs/kubo:v0.32.1
    container_name: shamba-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001" # swarm
      - "5001:5001" # api
      - "8080:8080" # gateway
    volumes:
      - ipfs_data:/data/ipfs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider --post-data='' http://localhost:5001/api/v0/version || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    # Local SMTP catcher for Auth.js magic-link development. The web app sends
    # mail to localhost:1025; the web UI for inspecting captured mail lives at
    # http://localhost:8025. Bound to 127.0.0.1 only so the captured inbox
    # (which may carry sign-in links) is not reachable from other hosts on
    # the local network.
    image: axllent/mailpit:v1.21
    container_name: shamba-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025" # SMTP
      - "127.0.0.1:8025:8025" # web UI
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
